# BENCH model - carbon price sensitivity with/without cp awareness
# Each entry runs a separate configuration. `runs` controls seed count per scenario.

- case_study: Netherlands-Overijssel
  scenario: Ref_SSP2
  policy: Ref
  learning_type: Fast adaptation
  run_label: Baseline_NoCP
  carbon_price_awareness: True
  runs: 64

- case_study: Netherlands-Overijssel
  scenario: Ref_SSP2
